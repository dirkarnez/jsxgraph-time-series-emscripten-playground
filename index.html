        function generateUniqueColors(n) {
            const colors = [];
            const saturation = 75; // Kept constant for vibrancy
            const lightness = 50;  // Kept constant for consistent brightness

            for (let i = 0; i < n; i++) {
                // Distribute hues evenly between 0 and 360
                const hue = Math.round((i * 360) / n); 
                colors.push(`hsl(${hue}, ${saturation}%, ${lightness}%)`);
            }

            return colors;
            }
